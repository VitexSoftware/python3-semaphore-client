openapi: 3.0.0
info:
  title: Semaphore API
  description: >
    Semaphore API provides endpoints for managing and interacting with the
    Semaphore UI.

    This documentation outlines the available operations and data models.
  version: 2.16.14
tags:
  - name: authentication
    description: Authentication, Logout & API Tokens
  - name: project
    description: Everything related to a project
  - name: user
    description: User-related API
  - name: integration
    description: Integration API
security:
  - bearer: []
  - cookie: []
paths:
  /ping:
    get:
      summary: PING test
      security: []
      responses:
        "200":
          description: Successful "PONG" reply
          headers:
            content-type:
              x-example: text/plain; charset=utf-8
              schema:
                type: string
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/Pong"
  /ws:
    get:
      summary: Websocket handler
      responses:
        "200":
          description: OK
        "401":
          description: not authenticated
      servers:
        - url: ws:/api
        - url: wss:/api
  /info:
    get:
      summary: Fetches information about semaphore
      description: you must be authenticated to use this
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InfoType"
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/InfoType"
  /auth/login:
    get:
      tags:
        - authentication
      summary: Fetches login metadata
      description: Fetches metadata for login, such as available OIDC providers
      security: []
      responses:
        "200":
          description: Login metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginMetadata"
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/LoginMetadata"
    post:
      tags:
        - authentication
      summary: Performs Login
      description: Upon success you will be logged in
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Login"
        required: true
      responses:
        "204":
          description: You are logged in
        "400":
          description: something in body is missing / is invalid
  /auth/logout:
    post:
      tags:
        - authentication
      summary: Destroys current session
      responses:
        "204":
          description: Your session was successfully nuked
  "/auth/oidc/{provider_id}/login":
    parameters:
      - name: provider_id
        in: path
        required: true
        example: mysso
        schema:
          type: string
    get:
      tags:
        - authentication
      summary: Begin OIDC authentication flow and redirect to OIDC provider
      description: The user agent is redirected to this endpoint when chosing to sign
        in via OIDC
      responses:
        "302":
          description: Redirection to the OIDC provider on success, or to the login page
            on error
  "/auth/oidc/{provider_id}/redirect":
    parameters:
      - name: provider_id
        in: path
        required: true
        example: mysso
        schema:
          type: string
    get:
      tags:
        - authentication
      summary: Finish OIDC authentication flow, upon succes you will be logged in
      description: The user agent is redirected here by the OIDC provider to complete
        authentication
      responses:
        "302":
          description: Redirection to the Semaphore root URL on success, or to the login
            page on error
  /user/:
    get:
      tags:
        - user
      summary: Fetch logged in user
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/User"
  /user/tokens:
    get:
      tags:
        - authentication
        - user
      summary: Fetch API tokens for user
      responses:
        "200":
          description: API Tokens
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APIToken"
            text/plain; charset=utf-8:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APIToken"
    post:
      tags:
        - authentication
        - user
      summary: Create an API token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: my CI token
      responses:
        "201":
          description: API Token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIToken"
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/APIToken"
  "/user/tokens/{api_token_id}":
    parameters:
      - name: api_token_id
        in: path
        required: true
        example: kwofd61g93-yuqvex8efmhjkgnbxlo8mp1tin6spyhu=
        schema:
          type: string
    delete:
      tags:
        - authentication
        - user
      summary: Expires API token
      responses:
        "204":
          description: Expired API Token
  /users:
    get:
      tags:
        - user
      summary: Fetches all users
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
            text/plain; charset=utf-8:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      tags:
        - user
      summary: Creates a user
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRequest"
        required: true
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: User creation failed
  "/users/{user_id}/":
    parameters:
      - $ref: "#/components/parameters/user_id"
    get:
      tags:
        - user
      summary: Fetches a user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/User"
    put:
      tags:
        - user
      summary: Updates user details
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPutRequest"
        required: true
      responses:
        "204":
          description: User Updated
    delete:
      tags:
        - user
      summary: Deletes user
      responses:
        "204":
          description: User deleted
  "/users/{user_id}/password":
    parameters:
      - $ref: "#/components/parameters/user_id"
    post:
      tags:
        - user
      summary: Updates user password
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  format: password
        required: true
      responses:
        "204":
          description: Password updated
  /projects:
    get:
      tags:
        - project
      summary: Get projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
            text/plain; charset=utf-8:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      tags:
        - project
      summary: Create a new project
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectRequest"
        required: true
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/Project"
  /projects/restore:
    post:
      tags:
        - project
      summary: Restore Project
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectBackup"
        required: true
      responses:
        "200":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/Project"
  /events:
    get:
      summary: Get Events related to Semaphore and projects you are part of
      responses:
        "200":
          description: Array of events in chronological order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
            text/plain; charset=utf-8:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
  /events/last:
    get:
      summary: Get last 200 Events related to Semaphore and projects you are part of
      responses:
        "200":
          description: Array of events in chronological order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
            text/plain; charset=utf-8:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
  "/project/{project_id}/":
    parameters:
      - $ref: "#/components/parameters/project_id"
    get:
      tags:
        - project
      summary: Fetch project
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/Project"
    put:
      tags:
        - project
      summary: Update project
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ProjectRequest"
                - properties:
                    id:
                      type: integer
                      minimum: 1
        required: true
      responses:
        "204":
          description: Project saved
    delete:
      tags:
        - project
      summary: Delete project
      responses:
        "204":
          description: Project deleted
  "/project/{project_id}/backup":
    parameters:
      - $ref: "#/components/parameters/project_id"
    get:
      tags:
        - project
      summary: Backup A Project
      responses:
        "200":
          description: Backup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectBackup"
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/ProjectBackup"
  "/project/{project_id}/role":
    parameters:
      - $ref: "#/components/parameters/project_id"
    get:
      tags:
        - project
      summary: Fetch permissions of the current user for project
      responses:
        "200":
          description: Permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  role:
                    type: string
                    example: owner
                  permissions:
                    type: number
                    example: 0
            text/plain; charset=utf-8:
              schema:
                type: object
                properties:
                  role:
                    type: string
                    example: owner
                  permissions:
                    type: number
                    example: 0
  "/project/{project_id}/events":
    parameters:
      - $ref: "#/components/parameters/project_id"
    get:
      tags:
        - project
      summary: Get Events related to this project
      responses:
        "200":
          description: Array of events in chronological order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
            text/plain; charset=utf-8:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
  "/project/{project_id}/users":
    parameters:
      - $ref: "#/components/parameters/project_id"
    get:
      tags:
        - project
      summary: Get users linked to project
      parameters:
        - name: sort
          in: query
          required: true
          description: sorting name
          example: email
          schema:
            type: string
            enum:
              - name
              - username
              - email
              - role
        - name: order
          in: query
          required: true
          description: ordering manner
          example: desc
          schema:
            type: string
            enum:
              - asc
              - desc
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectUser"
            text/plain; charset=utf-8:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectUser"
    post:
      tags:
        - project
      summary: Link user to project
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: integer
                  minimum: 2
                role:
                  type: string
                  enum:
                    - owner
                    - manager
                    - task_runner
                    - guest
                  example: owner
        required: true
      responses:
        "204":
          description: User added
  "/project/{project_id}/users/{user_id}":
    parameters:
      - $ref: "#/components/parameters/project_id"
      - $ref: "#/components/parameters/user_id"
    delete:
      tags:
        - project
      summary: Removes user from project
      responses:
        "204":
          description: User removed
    put:
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum:
                    - owner
                    - manager
                    - task_runner
                    - guest
                  example: owner
        required: true
      summary: Update user role
      tags:
        - project
      responses:
        "204":
          description: User updated
  "/project/{project_id}/integrations":
    parameters:
      - $ref: "#/components/parameters/project_id"
    get:
      tags:
        - integration
      summary: get all integrations
      responses:
        "200":
          description: integration
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Integration"
            text/plain; charset=utf-8:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Integration"
    post:
      summary: create a new integration
      tags:
        - integration
      requestBody:
        $ref: "#/components/requestBodies/IntegrationRequest"
      responses:
        "201":
          description: Integration Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/Integration"
  "/project/{project_id}/integrations/{integration_id}":
    parameters:
      - $ref: "#/components/parameters/project_id"
      - $ref: "#/components/parameters/integration_id"
    get:
      tags:
        - integration
      summary: Get Integration
      responses:
        "200":
          description: Integration Value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/Integration"
    put:
      tags:
        - integration
      summary: Update Integration
      requestBody:
        $ref: "#/components/requestBodies/IntegrationRequest"
      responses:
        "204":
          description: Integration updated
    delete:
      tags:
        - integration
      summary: Remove integration
      responses:
        "204":
          description: integration removed
  "/project/{project_id}/integrations/{integration_id}/values":
    parameters:
      - $ref: "#/components/parameters/project_id"
      - $ref: "#/components/parameters/integration_id"
    get:
      tags:
        - integration
      summary: Get Integration Extracted Values linked to integration extractor
      responses:
        "200":
          description: Integration Extracted Value
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntegrationExtractValue"
            text/plain; charset=utf-8:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntegrationExtractValue"
    post:
      tags:
        - integration
      summary: Add Integration Extracted Value
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrationExtractValue"
        required: true
      responses:
        "201":
          description: Integration Extract Value Created
        "400":
          description: Bad Integration Extract Value params
  "/project/{project_id}/integrations/{integration_id}/values/{extractvalue_id}":
    parameters:
      - $ref: "#/components/parameters/project_id"
      - $ref: "#/components/parameters/integration_id"
      - $ref: "#/components/parameters/extractvalue_id"
    put:
      tags:
        - integration
      summary: Updates Integration ExtractValue
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrationExtractValueRequest"
        required: true
      responses:
        "204":
          description: Integration Extract Value updated
        "400":
          description: Bad integration extract value parameter
    delete:
      tags:
        - integration
      summary: Removes integration extract value
      responses:
        "204":
          description: integration extract value removed
  "/project/{project_id}/integrations/{integration_id}/matchers":
    parameters:
      - $ref: "#/components/parameters/project_id"
      - $ref: "#/components/parameters/integration_id"
    get:
      tags:
        - integration
      summary: Get Integration Matcher linked to integration extractor
      responses:
        "200":
          description: Integration Matcher
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntegrationMatcher"
            text/plain; charset=utf-8:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntegrationMatcher"
    post:
      tags:
        - integration
      summary: Add Integration Matcher
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrationMatcher"
        required: true
      responses:
        "200":
          description: Integration Matcher Created
        "400":
          description: Bad Integration Matcher params
  "/project/{project_id}/integrations/{integration_id}/matchers/{matcher_id}":
    parameters:
      - $ref: "#/components/parameters/project_id"
      - $ref: "#/components/parameters/integration_id"
      - $ref: "#/components/parameters/matcher_id"
    put:
      tags:
        - integration
      summary: Updates Integration Matcher
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrationMatcherRequest"
        required: true
      responses:
        "204":
          description: Integration Matcher updated
        "400":
          description: Bad integration matcher parameter
    delete:
      tags:
        - integration
      summary: Removes integration matcher
      responses:
        "204":
          description: integration matcher removed
  "/project/{project_id}/integrations/aliases":
    parameters:
      - $ref: "#/components/parameters/project_id"
    get:
      tags:
        - integration
      summary: Get all integration aliases for the project
      responses:
        "200":
          description: Integration Aliases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntegrationAlias"
            text/plain; charset=utf-8:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntegrationAlias"
    post:
      tags:
        - integration
      summary: Create a new integration alias for the project
      responses:
        "200":
          description: Integration Alias Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationAlias"
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/IntegrationAlias"
  "/project/{project_id}/integrations/aliases/{alias_id}":
    parameters:
      - $ref: "#/components/parameters/project_id"
      - $ref: "#/components/parameters/alias_id"
    delete:
      tags:
        - integration
      summary: Remove integration alias
      responses:
        "204":
          description: integration alias removed
  "/project/{project_id}/integrations/{integration_id}/aliases":
    parameters:
      - $ref: "#/components/parameters/project_id"
      - $ref: "#/components/parameters/integration_id"
    get:
      tags:
        - integration
      summary: Get all aliases for an integration
      responses:
        "200":
          description: Integration Aliases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntegrationAlias"
            text/plain; charset=utf-8:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntegrationAlias"
    post:
      tags:
        - integration
      summary: Create a new alias for an integration
      responses:
        "200":
          description: Integration Alias Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationAlias"
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/IntegrationAlias"
  "/project/{project_id}/integrations/{integration_id}/aliases/{alias_id}":
    parameters:
      - $ref: "#/components/parameters/project_id"
      - $ref: "#/components/parameters/integration_id"
      - $ref: "#/components/parameters/alias_id"
    delete:
      tags:
        - integration
      summary: Remove integration alias
      responses:
        "204":
          description: integration alias removed
  "/project/{project_id}/keys":
    parameters:
      - $ref: "#/components/parameters/project_id"
    get:
      tags:
        - key-store
      summary: Get access keys linked to project
      parameters:
        - name: Key type
          in: query
          required: false
          description: Filter by key type
          example: none
          schema:
            type: string
            enum:
              - none
              - ssh
              - login_password
        - name: sort
          in: query
          required: true
          description: sorting name
          example: type
          schema:
            type: string
            enum:
              - name
              - type
        - name: order
          in: query
          required: true
          description: ordering manner
          example: asc
          schema:
            type: string
            enum:
              - asc
              - desc
      responses:
        "200":
          description: Access Keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccessKey"
            text/plain; charset=utf-8:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccessKey"
    post:
      tags:
        - key-store
      summary: Add access key
      requestBody:
        $ref: "#/components/requestBodies/AccessKeyRequest"
      responses:
        "201":
          description: Access Key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessKey"
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/AccessKey"
        "400":
          description: Bad type
  "/project/{project_id}/keys/{key_id}":
    parameters:
      - $ref: "#/components/parameters/project_id"
      - $ref: "#/components/parameters/key_id"
    put:
      tags:
        - key-store
      summary: Updates access key
      requestBody:
        $ref: "#/components/requestBodies/AccessKeyRequest"
      responses:
        "204":
          description: Key updated
        "400":
          description: Bad type
    delete:
      tags:
        - key-store
      summary: Removes access key
      responses:
        "204":
          description: access key removed
  "/project/{project_id}/repositories":
    parameters:
      - $ref: "#/components/parameters/project_id"
    get:
      tags:
        - repository
      summary: Get repositories
      parameters:
        - name: sort
          in: query
          required: true
          description: sorting name
          schema:
            type: string
            enum:
              - name
              - git_url
              - ssh_key
        - name: order
          in: query
          required: true
          description: ordering manner
          schema:
            type: string
            format: asc/desc
            enum:
              - asc
              - desc
      responses:
        "200":
          description: repositories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Repository"
            text/plain; charset=utf-8:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Repository"
    post:
      tags:
        - repository
      summary: Add repository
      requestBody:
        $ref: "#/components/requestBodies/RepositoryRequest"
      responses:
        "201":
          description: Repository created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Repository"
            text/plain; charset=utf-8:
              schema:
                $ref: "#/components/schemas/Repository"
