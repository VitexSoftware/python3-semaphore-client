servers:
  - url: /api
components:
  parameters:
    project_id:
      name: project_id
      description: Project ID
      in: path
      required: true
      example: 1
      schema:
        type: integer
    user_id:
      name: user_id
      description: User ID
      in: path
      required: true
      example: 2
      schema:
        type: integer
    key_id:
      name: key_id
      description: key ID
      in: path
      required: true
      example: 3
      schema:
        type: integer
    repository_id:
      name: repository_id
      description: repository ID
      in: path
      required: true
      example: 4
      schema:
        type: integer
    inventory_id:
      name: inventory_id
      description: inventory ID
      in: path
      required: true
      example: 5
      schema:
        type: integer
    environment_id:
      name: environment_id
      description: environment ID
      in: path
      required: true
      example: 6
      schema:
        type: integer
    template_id:
      name: template_id
      description: template ID
      in: path
      required: true
      example: 7
      schema:
        type: integer
    task_id:
      name: task_id
      description: task ID
      in: path
      required: true
      example: 8
      schema:
        type: integer
    schedule_id:
      name: schedule_id
      description: schedule ID
      in: path
      required: true
      example: 9
      schema:
        type: integer
    view_id:
      name: view_id
      description: view ID
      in: path
      required: true
      example: 10
      schema:
        type: integer
    integration_id:
      name: integration_id
      description: integration ID
      in: path
      required: true
      example: 11
      schema:
        type: integer
    extractvalue_id:
      name: extractvalue_id
      description: extractValue ID
      in: path
      required: true
      example: 12
      schema:
        type: integer
    matcher_id:
      name: matcher_id
      description: matcher ID
      in: path
      required: true
      example: 13
      schema:
        type: integer
    alias_id:
      name: alias_id
      description: Integration Alias ID
      in: path
      required: true
      example: 15
      schema:
        type: integer
    invite_id:
      name: invite_id
      description: Invite ID
      in: path
      required: true
      example: 14
      schema:
        type: integer
  requestBodies:
    InventoryRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/InventoryRequest"
      required: true
    ScheduleRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ScheduleRequest"
      required: true
    RepositoryRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RepositoryRequest"
      required: true
    ViewRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ViewRequest"
      required: true
    IntegrationRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/IntegrationRequest"
      required: true
    AccessKeyRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AccessKeyRequest"
      required: true
    EnvironmentRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EnvironmentRequest"
      required: true
    TemplateRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/TemplateRequest"
      required: true
  securitySchemes:
    cookie:
      type: apiKey
      name: Cookie
      in: header
    bearer:
      type: apiKey
      name: Authorization
      in: header
  schemas:
    App:
      type: object
    Pong:
      type: string
      x-example: pong
    Login:
      type: object
      properties:
        auth:
          type: string
          description: Username/Email address
          x-example: user@semaphoreui.com
        password:
          type: string
          format: password
          description: Password
    LoginMetadata:
      type: object
      properties:
        oidc_providers:
          type: array
          description: List of OIDC providers
          items:
            type: object
            properties:
              id:
                type: string
                description: ID of the provider, used in the login URL
                x-example: mysso
              name:
                type: string
                description: Text to show on the login button
                x-example: Sign in with MySSO
    UserRequest:
      type: object
      properties:
        name:
          type: string
          x-example: Integration Test User
          example: Integration Test User
        username:
          type: string
          x-example: test-user
          example: test-user
        email:
          type: string
          x-example: test@ansiblesemaphore.test
          example: test@ansiblesemaphore.test
        password:
          type: string
          format: password
        alert:
          type: boolean
        admin:
          type: boolean
        external:
          type: boolean
    UserPutRequest:
      type: object
      properties:
        name:
          type: string
          x-example: Integration Test User2
          example: Integration Test User2
        username:
          type: string
          x-example: test-user2
          example: test-user2
        email:
          type: string
          x-example: test2@ansiblesemaphore.test
          example: test2@ansiblesemaphore.test
        alert:
          type: boolean
        admin:
          type: boolean
    User:
      type: object
      properties:
        id:
          type: integer
          minimum: 1
        name:
          type: string
        username:
          type: string
        email:
          type: string
        created:
          type: string
        alert:
          type: boolean
        admin:
          type: boolean
        external:
          type: boolean
    ProjectUser:
      type: object
      properties:
        id:
          type: integer
          minimum: 1
        name:
          type: string
        username:
          type: string
        role:
          type: string
          enum:
            - owner
            - manager
            - task_runner
            - guest
    ProjectInvite:
      type: object
      properties:
        id:
          type: integer
          minimum: 1
        project_id:
          type: integer
          minimum: 1
        user_id:
          type: integer
          minimum: 1
          description: User ID for user-based invites (optional)
        email:
          type: string
          format: email
          description: Email address for email-based invites (optional)
        role:
          type: string
          enum:
            - owner
            - manager
            - task_runner
            - guest
          example: manager
        status:
          type: string
          enum:
            - pending
            - accepted
            - declined
            - expired
          example: pending
        inviter_user_id:
          type: integer
          minimum: 1
          description: ID of the user who created the invite
        created:
          type: string
          format: date-time
          description: When the invite was created
        expires_at:
          type: string
          format: date-time
          description: When the invite expires (optional)
        accepted_at:
          type: string
          format: date-time
          description: When the invite was accepted (optional)
        inviter_user:
          $ref: "#/components/schemas/User"
        user:
          $ref: "#/components/schemas/User"
    ProjectInviteRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Email address to invite (use either user_id or email, not both)
          x-example: user@example.com
        role:
          type: string
          enum:
            - owner
            - manager
            - task_runner
            - guest
          example: manager
        expires_at:
          type: string
          format: date-time
          description: When the invite should expire (optional, defaults to 7 days)
      required:
        - role
    AcceptInviteRequest:
      type: object
      properties:
        token:
          type: string
          description: The invitation token
          x-example: a1b2c3d4e5f6...
      required:
        - token
    ProjectBackup:
      type: object
      example:
        meta:
          name: homelab
          alert: true
          alert_chat: Test
          max_parallel_tasks: 0
          type: null
        templates:
          - inventory: Build
            repository: Demo
            environment: Empty
            name: Build
            playbook: build.yml
            arguments: "[]"
            allow_override_args_in_task: false
            description: Build Job
            vault_key: null
            type: build
            start_version: 1.0.0
            build_template: null
            view: Build
            autorun: false
            survey_vars: []
            suppress_success_alerts: false
            cron: "* * * * *"
        repositories:
          - name: Demo
            git_url: https://github.com/semaphoreui/semaphore-demo.git
            git_branch: main
            ssh_key: None
        keys:
          - name: None
            type: none
          - name: Vault Password
            type: login_password
        views:
          - title: Build
            position: 0
        inventories:
          - name: Build
            inventory: ""
            ssh_key: None
            become_key: None
            type: static
          - name: Dev
            inventory: ""
            ssh_key: None
            become_key: None
            type: file
          - name: Prod
            inventory: ""
            ssh_key: None
            become_key: None
            type: file
        environments:
          - name: Empty
            password: null
            json: "{}"
            env: null
      properties:
        meta:
          type: object
          properties:
            name:
              type: string
            alert:
              type: boolean
            alert_chat:
              type: string
            max_parallel_tasks:
              type: integer
              minimum: 0
            type:
              type: string
        templates:
          type: array
          items:
